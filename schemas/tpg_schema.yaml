properties:
  priority:
    type: number
    minimum: -100
    description: "If <0, object will never be allocated; higher numbers = higher priority"

  tag:
    type: string
    description: "Comma-separated list of tags for allocation filtering"

  comment:
    type: string
    description: "Comment visible to the observer"

  cycle:
    type: number
    minimum: 0
    description: "Days since last observation (can be fractional of day for hours)"

  ph_mk:
    type: string
    pattern: '^\d+/\w+/\d+(\.\d+)?$'
    description: "Phase masking parameters: no_of_obs/band_light_curve/phase_bin"

  obs_data:
    type: string
    description: "Explicitly specified data file for cycle or phase masking"

  t_start:
    type: string
    pattern: '^(\d{4}/\d{2}/\d{2}(T\d{1,2}:\d{2}:\d{2})?|(\d{4}/\d{2}/\d{2})|(\d{1,2}:\d{2}:\d{2}))$'
    description: "Start time/date in various formats"

  ph_star:
    type: number
    description: "Phase to start observing"

  ph_end:
    type: number
    description: "Phase to end observing"

  P:
    type: number
    description: "Period of the cycle"

  hjd0:
    type: number
    description: "Reference HJD zero point for phase calculations"

  h_min:
    type: number
    description: "Minimum altitude above horizon for observation"

  h_max:
    type: number
    description: "Maximum altitude above horizon for observation"

  min_moon_dist:
    type: number
    description: "Minimum allowed distance from the moon"

  max_moon_phase:
    type: number
    description: "Maximum allowed moon phase (%)"

  ob_time:
    type: number
    description: "Slot time in minutes, overrides automatic calculation"

  makro:
    type: string
    description: "Path to macro file to include in the plan"

