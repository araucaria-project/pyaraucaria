$id: "https://araucaria-project.github.io/schemas/types/dec.yaml"
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Declination"
description: "Declination in degree sexagesimal ([±]DD:MM:SS[.s]), range [-90, +90]."
type: string
pattern: '^[\+\-]?(?:[0-8]?\d|90):[0-5]\d:[0-5]\d(?:\.\d+)?$'
examples:
  - "-17:21:39.29"
  - "+20:20:20"
  - "-46:28:30"
